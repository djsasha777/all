user nobody nogroup;
worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    sendfile        on;
    keepalive_timeout  90;

# ACME
    server {
        listen 9090;
        location ^~ /.well-known/acme-challenge/ {
            allow all;
            root /var/run/acme/challenge;
            default_type "text/plain";
            try_files $uri =404;
        }
    }
# INFO PAGE
    server {
        listen 8888 ssl;
        root /etc/front;
        index info.html;
        ssl_certificate /etc/nginx/ssl.crt;
        ssl_certificate_key /etc/nginx/ssl.key;
        ssl_protocols TLSv1.2 TLSv1.1 TLSv1;
        location / {
           try_files $uri $uri/ =404;
        }
    }
# SMARTHOME PROXY 
    server {
        listen 8899 ssl;
        auth_basic           "Administrator's Area";
        auth_basic_user_file /etc/pass/htpasswd;
        root /etc/front;
        index home.html;
        ssl_certificate /etc/nginx/ssl.crt;
        ssl_certificate_key /etc/nginx/ssl.key;
        ssl_protocols TLSv1.2 TLSv1.1 TLSv1;
        location / {
           try_files $uri $uri/ =404;
        }
        location /on {
            proxy_pass http://192.168.111.238/on;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /long {
            proxy_pass http://192.168.111.238/long;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /1toggle {
            proxy_pass http://192.168.111.108:8080/toggle21;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location /2toggle {
            proxy_pass http://192.168.111.108:8080/toggle32;
            proxy_set_header Host $host;

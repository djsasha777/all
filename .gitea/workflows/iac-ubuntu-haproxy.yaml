name: ubuntu-haproxy
on:
  push:
    branches: [ "main" ]
    paths:
      - iac/ansible/loadbalancer-haproxy/**
  workflow_dispatch:

jobs:
  provision:
    runs-on: linux/arm
    steps:
    - name: Deploy haproxy via SSH (with printf)
      run: |
        git clone http://192.168.111.1:3000/djsasha777/all.git

        # --- ФИНАЛЬНОЕ И ВЕРНОЕ РЕШЕНИЕ ---
        # 1. Создаем файл с ответом "yes" и переводом строки.
        #    Это именно то, что ждет Dropbear.
        printf 'yes\n' > /tmp/answer.txt

        # 2. Запускаем SSH, перенаправляя содержимое файла в его стандартный ввод.
        #    Клиент Dropbear прочитает наш ответ и не будет запрашивать подтверждение.
        ssh -i /root/.ssh/dropbear_rsa -T root@91.149.218.39 << 'EOF' < /tmp/answer.txt
        set -e
        cd /root/loadbalancer-haproxy
        ansible-playbook haproxy.yaml
        rm -rf /root/loadbalancer-haproxy
        echo "ansible playbook finished"
        EOF

        rm -rf all
name: ubuntu-haproxy
on:
  push:
    branches: [ "main" ]
    paths:
      - iac/ansible/loadbalancer-haproxy/**
  workflow_dispatch:

jobs:
  provision:
    runs-on: linux/arm
    steps:
    - name: Deploy haproxy via SSH
      run: |
        git clone http://192.168.111.1:3000/djsasha777/all.git

        # --- ФИНАЛЬНОЕ И ВЕРНОЕ РЕШЕНИЕ ДЛЯ DROPBEAR ---
        # 1. Создаем файл для ключей
        touch /tmp/known_hosts_dropbear

        # 2. Передаем переменную ОКРУЖЕНИЯ НАПРЯМУЮ в команду scp
        # Это гарантирует, что именно процесс scp увидит эту настройку.
        DROPBEAR_KNOWN_HOSTS=/tmp/known_hosts_dropbear scp -i /root/.ssh/dropbear_rsa -r all/iac/ansible/loadbalancer-haproxy root@91.149.218.39:/root/

        # 3. Передаем переменную ОКРУЖЕНИЯ НАПРЯМУЮ в команду ssh
        # Ключ уже добавлен предыдущим шагом, соединение пройдет успешно.
        DROPBEAR_KNOWN_HOSTS=/tmp/known_hosts_dropbear ssh -i /root/.ssh/dropbear_rsa -T root@91.149.218.39 << 'EOF'
        set -e
        cd /root/loadbalancer-haproxy
        ansible-playbook haproxy.yaml
        rm -rf /root/loadbalancer-haproxy
        echo "ansible playbook finished"
        EOF

        rm -rf all
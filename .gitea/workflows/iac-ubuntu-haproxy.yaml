name: ubuntu-haproxy
on:
  push:
    branches: [ "main" ]
    paths:
      - iac/ansible/loadbalancer-haproxy/**
  workflow_dispatch:

jobs:
  provision:
    runs-on: linux/arm
    steps:
    - name: Deploy haproxy via SSH
      run: |
        git clone http://192.168.111.1:3000/djsasha777/all.git

        # --- ЭТО РЕШЕНИЕ ДЛЯ DROPBEAR ---
        # Указываем пустой файл для известных хостов.
        export DROPBEAR_KNOWN_HOSTS=/dev/null

        # Копируем файлы
        scp -i /root/.ssh/dropbear_rsa -r all/iac/ansible/loadbalancer-haproxy root@91.149.218.39:/root/

        # Выполняем команды на сервере
        ssh -i /root/.ssh/dropbear_rsa -T root@91.149.218.39 << 'EOF'
        set -e
        cd /root/loadbalancer-haproxy
        ansible-playbook haproxy.yaml
        rm -rf /root/loadbalancer-haproxy
        echo "ansible playbook finished"
        EOF

        rm -rf all
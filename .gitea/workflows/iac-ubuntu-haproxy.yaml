name: ubuntu-haproxy
on:
  push:
    branches: [ "main" ]
    paths:
      - iac/ansible/loadbalancer-haproxy/**
  workflow_dispatch:

jobs:
  provision:
    runs-on: linux/arm
    steps:
    - name: Deploy haproxy via SSH (Final Solution)
      run: |
        git clone http://192.168.111.1:3000/djsasha777/all.git

        # --- ФИНАЛЬНОЕ И ВЕРНОЕ РЕШЕНИЕ ---
        # 1. Создаем файл для хранения ключей
        touch /tmp/known_hosts

        # 2. Указываем Dropbear использовать этот файл
        export DROPBEAR_KNOWN_HOSTS=/tmp/known_hosts

        # 3. ЭТОТ ШАГ РЕШАЕТ ПРОБЛЕМУ:
        #    Явно указываем SCP использовать ТОЛЬКО RSA-ключ хоста.
        #    Опция -r <keytype> заставляет Dropbear игнорировать другие типы ключей.
        scp -i /root/.ssh/dropbear_rsa -r rsa -oHostKeyAlgorithms=+ssh-rsa \
            all/iac/ansible/loadbalancer-haproxy root@91.149.218.39:/root/

        # 4. Теперь подключаемся по SSH.
        #    Ключ уже добавлен в /tmp/known_hosts предыдущим шагом.
        ssh -i /root/.ssh/dropbear_rsa -T root@91.149.218.39 << 'EOF'
        set -e
        cd /root/loadbalancer-haproxy
        ansible-playbook haproxy.yaml
        rm -rf /root/loadbalancer-haproxy
        echo "ansible playbook finished"
        EOF

        rm -rf all
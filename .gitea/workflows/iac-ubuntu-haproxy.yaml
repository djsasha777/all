name: ubuntu-haproxy
on:
  push:
    branches: [ "main" ]
    paths:
      - iac/ansible/loadbalancer-haproxy/**
  workflow_dispatch:

jobs:
  provision:
    runs-on: linux/arm
    steps:
    - name: Deploy haproxy via SSH and SCP (with printf)
      run: |
        git clone http://192.168.111.1:3000/djsasha777/all.git

        # --- ФИНАЛЬНОЕ И ВЕРНОЕ РЕШЕНИЕ ---
        # 1. Создаем файл с ответом "yes" и переводом строки.
        printf 'yes\n' > /tmp/answer.txt

        # 2. Копируем файлы, передавая ответ в SCP.
        #    Ваша версия SCP прочитает "yes" и не будет запрашивать подтверждение.
        scp -i /root/.ssh/dropbear_rsa -r all/iac/ansible/loadbalancer-haproxy root@91.149.218.39:/root/ < /tmp/answer.txt

        # 3. Теперь подключаемся по SSH. Ключ уже в кэше, соединение пройдет.
        ssh -i /root/.ssh/dropbear_rsa -T root@91.149.218.39 << 'EOF'
        set -e
        cd /root/loadbalancer-haproxy
        ansible-playbook haproxy.yaml
        rm -rf /root/loadbalancer-haproxy
        echo "ansible playbook finished"
        EOF

        rm -rf all